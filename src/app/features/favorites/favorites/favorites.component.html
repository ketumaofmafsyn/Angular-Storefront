<div class="catalog-container">
  <h2 class="catalog-title">Your Favorites</h2>

  
  <div *ngIf="loading()" class="loading-container">
    <div class="spinner"></div>
    <span class="visually-hidden">Loading...</span>
  </div>


  <div *ngIf="!loading() && favoriteProducts().length === 0" class="text-center py-5">
    <p>You have no favorite products yet.</p>
  </div>

  <div class="products-grid" *ngIf="!loading() && favoriteProducts().length > 0">
    <div *ngFor="let product of favoriteProducts()" class="product-card">
      <img [src]="product.images[0]" [alt]="product.title" class="product-image" />
      <div class="product-info">
        <h5 class="product-name">{{ product.title }}</h5>
        <p class="product-description">{{ product.description | slice:0:80 }}...</p>
        <p class="product-price">R {{ product.price | number:'1.2-2' }}</p>
        <button class="product-btn" [routerLink]="['/product', product.id]">
          View Details
        </button>
        <button
          class="favorite-btn"
          (click)="favoritesService.toggleFavorite(product.id)"
          [class.active]="favoritesService.isFavorite(product.id)"
        >
          ♥
        </button>
      </div>
    </div>
  </div>
</div>
